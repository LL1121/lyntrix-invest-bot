version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: lyntrix_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=lyntrix_admin
      - POSTGRES_PASSWORD=lyntrix_pass
      - POSTGRES_DB=lyntrix_invest
    volumes:
      - ./infra/timescale/init.sql:/docker-entrypoint-initdb.d/init.sql
      - timescaledb_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lyntrix_bus
    ports:
      - "6379:6379"

  # Los agentes se sumarán aquí a medida que los desarrollemos
  # Por ahora, dejamos la base lista para conectarnos desde local o contenedores

volumes:
  timescaledb_data:
